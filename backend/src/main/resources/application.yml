server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gpmitconnect-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:gpmitconnect;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:gpmitconnect-super-secret-jwt-key-for-demo-please-change}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
