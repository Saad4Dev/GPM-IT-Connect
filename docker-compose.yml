services:
  mysql:
    image: mysql:8.4
    container_name: gpmitconnect-mysql
    environment:
      MYSQL_DATABASE: gpmitconnect
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: gpmitconnect
      MYSQL_PASSWORD: gpmitconnect
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: gpmitconnect-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/gpmitconnect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: gpmitconnect
      DB_PASSWORD: gpmitconnect
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JWT_SECRET: gpmitconnect-super-secret-jwt-key-for-demo-please-change
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: gpmitconnect-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
